<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Cheervinsky — Tools for a calmer day</title>
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <style>
    body { margin: 0; }
    main { display: block; }
    /* Smooth scroll for in-page anchors */
    html { scroll-behavior: smooth; }
  </style>
</head>
<body>
  <div id="root" data-screen-label="Cheervinsky Homepage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="SiteHeader.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="AppCard.jsx"></script>
  <script type="text/babel" src="AppsGrid.jsx"></script>
  <script type="text/babel" src="Manifesto.jsx"></script>
  <script type="text/babel" src="DeepDive.jsx"></script>
  <script type="text/babel" src="Newsletter.jsx"></script>
  <script type="text/babel" src="SiteFooter.jsx"></script>

  <script type="text/babel">
    const App = () => (
      <main>
        <SiteHeader/>
        <Hero/>
        <AppsGrid/>
        <Manifesto/>
        <DeepDive/>
        <Newsletter/>
        <SiteFooter/>
      </main>
    );
    const waitFor = (cond, cb) => {
      if (cond()) cb();
      else setTimeout(() => waitFor(cond, cb), 20);
    };
    waitFor(
      () => window.SiteHeader && window.Hero && window.AppsGrid && window.Manifesto && window.DeepDive && window.Newsletter && window.SiteFooter,
      () => ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
    );
  </script>
</body>
</html>
