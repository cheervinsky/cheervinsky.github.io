<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:12px; justify-content:center;">
    <div class="label">Motion — slow, soft, intentional</div>
    <div class="row" style="gap:20px; align-items:center;">
      <div class="col" style="gap:8px; align-items:center;">
        <div class="breathe" style="width:64px; height:64px; background:radial-gradient(circle at 40% 40%, #F2B8A2, #E9873B); border-radius:999px;"></div>
        <div class="tick-name">Ambient · breathe 6s</div>
      </div>
      <div class="col" style="gap:4px; flex:1; font-family:'JetBrains Mono',monospace; font-size:11px; color:#4B423A; line-height:1.8;">
        <div><b style="color:#1E1A17;">--dur-micro</b> &nbsp;120ms &nbsp;focus ring</div>
        <div><b style="color:#1E1A17;">--dur-ui</b> &nbsp;&nbsp;&nbsp;&nbsp;220ms &nbsp;hover, menu</div>
        <div><b style="color:#1E1A17;">--dur-scene</b> &nbsp;&nbsp;420ms &nbsp;page section</div>
        <div><b style="color:#1E1A17;">--dur-ambient</b> 6000ms &nbsp;breathing</div>
        <div style="margin-top:4px;"><b style="color:#1E1A17;">--ease-soft</b> &nbsp;cubic-bezier(.22, .61, .36, 1)</div>
      </div>
    </div>
  </div>
</div>
</body></html>
