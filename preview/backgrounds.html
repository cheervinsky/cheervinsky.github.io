<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row grow" style="gap:0; align-items:stretch;">
    <div style="flex:1; background:#F3EADB; border-radius:14px 0 0 14px; padding:16px; display:flex; flex-direction:column; justify-content:space-between;">
      <div class="label">Paper</div>
      <div style="font-family:'Inter',sans-serif; font-size:13px; color:#4B423A;">Default canvas.</div>
    </div>
    <div style="flex:1; background:radial-gradient(ellipse at top, #FADFB9, transparent 70%), #F3EADB; padding:16px; display:flex; flex-direction:column; justify-content:space-between;">
      <div class="label">Honey wash</div>
      <div style="font-family:'Inter',sans-serif; font-size:13px; color:#4B423A;">Hero glow. Once per page.</div>
    </div>
    <div style="flex:1; background:#F3EADB; position:relative; padding:16px; overflow:hidden; display:flex; flex-direction:column; justify-content:space-between;">
      <div style="position:absolute; inset:0; background:url(../assets/paper-grain.svg); opacity:.5; mix-blend-mode:multiply;"></div>
      <div class="label" style="position:relative;">Paper grain</div>
      <div style="font-family:'Inter',sans-serif; font-size:13px; color:#4B423A; position:relative;">3–6% grain on large surfaces.</div>
    </div>
    <div style="flex:1; background:#1E1A17; border-radius:0 14px 14px 0; padding:16px; display:flex; flex-direction:column; justify-content:space-between; color:#F3EADB;">
      <div class="label" style="color:#8A7F72;">Ink (rare)</div>
      <div style="font-family:'Inter',sans-serif; font-size:13px; color:#D6C8AF;">Reserved for night / hero moments.</div>
    </div>
  </div>
</div>
</body></html>
