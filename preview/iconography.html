<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="card">
  <div class="col grow" style="gap:14px; justify-content:center;">
    <div class="label">Iconography — Lucide · 1.75px stroke · 24px</div>
    <div class="row" style="gap:18px; color:#1E1A17;">
      <i data-lucide="sun" width="28" height="28"></i>
      <i data-lucide="moon-star" width="28" height="28"></i>
      <i data-lucide="flame" width="28" height="28"></i>
      <i data-lucide="eye" width="28" height="28"></i>
      <i data-lucide="sprout" width="28" height="28"></i>
      <i data-lucide="sparkles" width="28" height="28"></i>
      <i data-lucide="book-open" width="28" height="28"></i>
      <i data-lucide="clock" width="28" height="28"></i>
      <i data-lucide="check" width="28" height="28"></i>
      <i data-lucide="arrow-right" width="28" height="28"></i>
      <i data-lucide="heart" width="28" height="28"></i>
      <i data-lucide="settings" width="28" height="28"></i>
    </div>
    <div class="tick">Inherits currentColor · rests at --ink-2 · --honey for focal action only · never filled</div>
  </div>
</div>
<script>lucide.createIcons({ attrs: { 'stroke-width': 1.75 }});</script>
</body></html>
