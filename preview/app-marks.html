<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:14px; justify-content:center;">
    <div class="label">App marks — one glyph per app</div>
    <div class="row" style="gap:22px;">
      <div class="col" style="align-items:center; gap:6px;"><div style="width:56px; height:56px; background:#F2B8A2; border-radius:14px; display:flex; align-items:center; justify-content:center; color:#4B2A1E;"><img src="../assets/marks/dawn.svg" width="32" height="32" style="filter:invert(10%) sepia(20%) saturate(400%) hue-rotate(350deg);"/></div><div class="tick-name">Dawn</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:56px; height:56px; background:#C0532A; border-radius:14px; display:flex; align-items:center; justify-content:center; color:#F3EADB;"><img src="../assets/marks/kiln.svg" width="32" height="32" style="filter:invert(95%) sepia(10%) saturate(200%) hue-rotate(350deg);"/></div><div class="tick-name">Kiln</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:56px; height:56px; background:#6E7F5C; border-radius:14px; display:flex; align-items:center; justify-content:center;"><img src="../assets/marks/mira.svg" width="32" height="32" style="filter:invert(95%) sepia(10%) saturate(200%) hue-rotate(350deg);"/></div><div class="tick-name">Mira</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:56px; height:56px; background:#7FA27E; border-radius:14px; display:flex; align-items:center; justify-content:center;"><img src="../assets/marks/sprout.svg" width="32" height="32" style="filter:invert(95%) sepia(10%) saturate(200%) hue-rotate(350deg);"/></div><div class="tick-name">Sprout</div></div>
      <div class="col" style="align-items:center; gap:6px;"><div style="width:56px; height:56px; background:#E8C547; border-radius:14px; display:flex; align-items:center; justify-content:center;"><img src="../assets/marks/confetti.svg" width="32" height="32" style="filter:invert(10%) sepia(20%) saturate(400%) hue-rotate(20deg);"/></div><div class="tick-name">Confetti</div></div>
    </div>
  </div>
</div>
</body></html>
