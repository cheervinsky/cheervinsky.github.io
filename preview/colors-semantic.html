<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:14px; justify-content:center;">
    <div class="label">Semantic</div>
    <div class="row" style="gap:12px;">
      <div class="col" style="flex:1; gap:6px;"><div class="swatch" style="height:48px; background:#5E8C4C;"></div><div class="tick-name">OK</div><div class="tick">#5E8C4C · --ok</div></div>
      <div class="col" style="flex:1; gap:6px;"><div class="swatch" style="height:48px; background:#C98A2B;"></div><div class="tick-name">Warn</div><div class="tick">#C98A2B · --warn</div></div>
      <div class="col" style="flex:1; gap:6px;"><div class="swatch" style="height:48px; background:#B4432B;"></div><div class="tick-name">Danger</div><div class="tick">#B4432B · --danger</div></div>
      <div class="col" style="flex:1; gap:6px;"><div class="swatch" style="height:48px; background:#4E6B7F;"></div><div class="tick-name">Info</div><div class="tick">#4E6B7F · --info</div></div>
    </div>
  </div>
</div>
</body></html>
