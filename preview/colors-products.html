<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:14px; justify-content:center;">
    <div class="label">Product tints — one per app</div>
    <div class="row" style="gap:10px;">
      <div class="col" style="flex:1; gap:6px;"><div class="swatch" style="height:48px; background:#F2B8A2;"></div><div class="tick-name">Dawn</div><div class="tick">#F2B8A2</div></div>
      <div class="col" style="flex:1; gap:6px;"><div class="swatch" style="height:48px; background:#C0532A;"></div><div class="tick-name">Kiln</div><div class="tick">#C0532A</div></div>
      <div class="col" style="flex:1; gap:6px;"><div class="swatch" style="height:48px; background:#6E7F5C;"></div><div class="tick-name">Mira</div><div class="tick">#6E7F5C</div></div>
      <div class="col" style="flex:1; gap:6px;"><div class="swatch" style="height:48px; background:#7FA27E;"></div><div class="tick-name">Sprout</div><div class="tick">#7FA27E</div></div>
      <div class="col" style="flex:1; gap:6px;"><div class="swatch" style="height:48px; background:#E8C547;"></div><div class="tick-name">Confetti</div><div class="tick">#E8C547</div></div>
    </div>
  </div>
</div>
</body></html>
