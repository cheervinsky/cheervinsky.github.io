<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:10px; justify-content:center;">
    <div class="label">Inputs</div>
    <div class="row" style="gap:12px; font-family:'Inter',sans-serif;">
      <div class="col" style="flex:1; gap:6px;">
        <label style="font-size:12px; color:#8A7F72; font-weight:600; letter-spacing:.06em; text-transform:uppercase;">Email</label>
        <input value="you@cheervinsky.co" style="padding:12px 14px; background:#EADFCB; border:1px solid #D6C8AF; border-radius:8px; font:400 15px Inter; color:#1E1A17;"/>
      </div>
      <div class="col" style="flex:1; gap:6px;">
        <label style="font-size:12px; color:#8A7F72; font-weight:600; letter-spacing:.06em; text-transform:uppercase;">Intention</label>
        <input placeholder="Write one thing." style="padding:12px 14px; background:#EADFCB; border:1px solid #D6C8AF; border-radius:8px; font:400 15px Inter; color:#1E1A17;"/>
      </div>
    </div>
    <div class="tick">Paper-2 fill · hairline rule · 8px radius · sentence-case placeholders</div>
  </div>
</div>
</body></html>
