<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:12px; justify-content:center;">
    <div class="label">Spacing — 8-pt base with half-steps</div>
    <div class="row" style="gap:8px; align-items:flex-end; height:72px;">
      <div class="col" style="gap:4px; align-items:center;"><div style="width:2px; height:2px; background:#1E1A17;"></div><div class="tick">2</div></div>
      <div class="col" style="gap:4px; align-items:center;"><div style="width:4px; height:4px; background:#1E1A17;"></div><div class="tick">4</div></div>
      <div class="col" style="gap:4px; align-items:center;"><div style="width:8px; height:8px; background:#1E1A17;"></div><div class="tick">8</div></div>
      <div class="col" style="gap:4px; align-items:center;"><div style="width:12px; height:12px; background:#1E1A17;"></div><div class="tick">12</div></div>
      <div class="col" style="gap:4px; align-items:center;"><div style="width:16px; height:16px; background:#1E1A17;"></div><div class="tick">16</div></div>
      <div class="col" style="gap:4px; align-items:center;"><div style="width:24px; height:24px; background:#1E1A17;"></div><div class="tick">24</div></div>
      <div class="col" style="gap:4px; align-items:center;"><div style="width:32px; height:32px; background:#1E1A17;"></div><div class="tick">32</div></div>
      <div class="col" style="gap:4px; align-items:center;"><div style="width:48px; height:48px; background:#1E1A17;"></div><div class="tick">48</div></div>
      <div class="col" style="gap:4px; align-items:center;"><div style="width:64px; height:48px; background:#1E1A17;"></div><div class="tick">64</div></div>
      <div class="col" style="gap:4px; align-items:center;"><div style="width:96px; height:48px; background:#1E1A17;"></div><div class="tick">96</div></div>
    </div>
  </div>
</div>
</body></html>
