<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:10px; justify-content:center;">
    <div class="label">Focus ring &amp; states</div>
    <div class="row" style="gap:14px; font-family:'Inter',sans-serif;">
      <button style="background:#E9873B; color:#F3EADB; border:none; padding:10px 18px; border-radius:999px; font:500 14px Inter;">Rest</button>
      <button style="background:#D77126; color:#F3EADB; border:none; padding:10px 18px; border-radius:999px; font:500 14px Inter; transform:translateY(-1px); box-shadow:0 2px 0 rgba(30,26,23,.05), 0 10px 24px -8px rgba(30,26,23,.14);">Hover</button>
      <button style="background:#C66716; color:#F3EADB; border:none; padding:10px 18px; border-radius:999px; font:500 14px Inter; transform:scale(.985); box-shadow:0 1px 0 rgba(30,26,23,.04);">Pressed</button>
      <button style="background:#E9873B; color:#F3EADB; border:none; padding:10px 18px; border-radius:999px; font:500 14px Inter; box-shadow:0 0 0 2px #F3EADB, 0 0 0 4px rgba(233,135,59,.55);">Focused</button>
      <button style="background:#E9873B; color:#F3EADB; border:none; padding:10px 18px; border-radius:999px; font:500 14px Inter; opacity:.4;">Disabled</button>
    </div>
    <div class="tick">Hover lifts 1px · press scales .985 · focus 2px honey ring at 55% on paper</div>
  </div>
</div>
</body></html>
