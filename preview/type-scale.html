<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="justify-content:center; gap:2px;">
    <div class="label" style="margin-bottom:10px;">Type scale · rem (16px root)</div>
    <div style="display:grid; grid-template-columns:50px 1fr; row-gap:4px; align-items:baseline; font-family:'Inter',sans-serif;">
      <div class="tick">12</div><div style="font-size:12px;">Caption · tiny meta</div>
      <div class="tick">14</div><div style="font-size:14px;">Small · secondary UI</div>
      <div class="tick">16</div><div style="font-size:16px;">Body · reading size</div>
      <div class="tick">18</div><div style="font-size:18px;">H4 · subhead</div>
      <div class="tick">22</div><div style="font-family:'Fraunces',serif; font-size:22px;">Lead · intro copy</div>
      <div class="tick">28</div><div style="font-family:'Fraunces',serif; font-size:28px; line-height:1.1;">H3 · section</div>
      <div class="tick">48</div><div style="font-family:'Fraunces',serif; font-size:40px; line-height:1;">H2 · big</div>
    </div>
  </div>
</div>
</body></html>
