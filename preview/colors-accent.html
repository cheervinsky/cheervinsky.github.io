<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:14px; justify-content:center;">
    <div class="label">Accent — the one honey</div>
    <div class="row" style="gap:12px;">
      <div class="col" style="flex:1.2; gap:6px;">
        <div class="swatch" style="height:72px; background:#E9873B;"></div>
        <div class="tick-name">Honey</div>
        <div class="tick">#E9873B · --honey</div>
      </div>
      <div class="col" style="flex:1; gap:6px;">
        <div class="swatch" style="height:72px; background:#7A3E10;"></div>
        <div class="tick-name">Honey ink</div>
        <div class="tick">#7A3E10 · --honey-ink</div>
      </div>
      <div class="col" style="flex:1; gap:6px;">
        <div class="swatch" style="height:72px; background:#FADFB9;"></div>
        <div class="tick-name">Honey wash</div>
        <div class="tick">#FADFB9 · --honey-wash</div>
      </div>
      <div class="col" style="flex:1.4; gap:6px; align-items:flex-start; justify-content:center;">
        <button style="background:#E9873B; color:#F3EADB; border:none; padding:10px 18px; border-radius:999px; font:500 14px Inter, sans-serif; cursor:pointer;">Start a session</button>
        <span class="tick">One accent, one screen, one purpose.</span>
      </div>
    </div>
  </div>
</div>
</body></html>
