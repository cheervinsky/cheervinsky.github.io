<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:14px; justify-content:center;">
    <div class="label">Ink — warm black, never pure</div>
    <div class="row" style="gap:12px;">
      <div class="col" style="flex:1; gap:6px;">
        <div class="swatch" style="height:56px; background:#1E1A17;"></div>
        <div class="tick-name">Ink · primary text</div>
        <div class="tick">#1E1A17 · --ink</div>
      </div>
      <div class="col" style="flex:1; gap:6px;">
        <div class="swatch" style="height:56px; background:#4B423A;"></div>
        <div class="tick-name">Ink 2 · secondary</div>
        <div class="tick">#4B423A · --ink-2</div>
      </div>
      <div class="col" style="flex:1; gap:6px;">
        <div class="swatch" style="height:56px; background:#8A7F72;"></div>
        <div class="tick-name">Ink 3 · tertiary</div>
        <div class="tick">#8A7F72 · --ink-3</div>
      </div>
      <div class="col" style="flex:1; gap:6px; justify-content:flex-end;">
        <div style="padding:10px 12px; background:#F3EADB; color:#1E1A17; border-radius:8px; font-size:14px; line-height:1.4;">
          Ink on paper — the default reading contrast.
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
