<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:14px; justify-content:center;">
    <div class="label">Buttons — primary, secondary, ghost, destructive</div>
    <div class="row" style="gap:12px; flex-wrap:wrap; font-family:'Inter',sans-serif;">
      <button style="background:#E9873B; color:#F3EADB; border:none; padding:12px 22px; border-radius:999px; font:500 15px Inter; cursor:pointer; box-shadow:0 1px 0 rgba(30,26,23,.06);">Start a session</button>
      <button style="background:#EADFCB; color:#1E1A17; border:1px solid #D6C8AF; padding:12px 22px; border-radius:999px; font:500 15px Inter; cursor:pointer;">Learn more</button>
      <button style="background:transparent; color:#1E1A17; border:none; padding:12px 16px; font:500 15px Inter; cursor:pointer; text-decoration:underline; text-underline-offset:4px;">Skip</button>
      <button style="background:transparent; color:#B4432B; border:none; padding:12px 18px; font:500 15px Inter; cursor:pointer;">Delete</button>
    </div>
    <div class="tick">44–48px tall · pill radius for short labels, md radius for wide · min 44px target</div>
  </div>
</div>
</body></html>
