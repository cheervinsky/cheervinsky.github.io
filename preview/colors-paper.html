<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:14px; justify-content:center;">
    <div class="label">Canvas — warm paper, not white</div>
    <div class="row" style="gap:12px;">
      <div class="col" style="flex:1; gap:6px;">
        <div class="swatch" style="height:56px; background:#F3EADB;"></div>
        <div class="tick-name">Paper</div>
        <div class="tick">#F3EADB · --paper</div>
      </div>
      <div class="col" style="flex:1; gap:6px;">
        <div class="swatch" style="height:56px; background:#EADFCB;"></div>
        <div class="tick-name">Paper 2 · raised</div>
        <div class="tick">#EADFCB · --paper-2</div>
      </div>
      <div class="col" style="flex:1; gap:6px;">
        <div class="swatch" style="height:56px; background:#E0D3B8;"></div>
        <div class="tick-name">Paper 3 · sunken</div>
        <div class="tick">#E0D3B8 · --paper-3</div>
      </div>
      <div class="col" style="flex:1; gap:6px;">
        <div class="swatch" style="height:56px; background:#D6C8AF;"></div>
        <div class="tick-name">Rule · hairline</div>
        <div class="tick">#D6C8AF · --rule</div>
      </div>
    </div>
  </div>
</div>
</body></html>
