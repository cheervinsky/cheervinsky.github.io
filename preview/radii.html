<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:12px; justify-content:center;">
    <div class="label">Radii — everything is rounded</div>
    <div class="row" style="gap:16px; align-items:flex-end;">
      <div class="col" style="gap:6px; align-items:center;"><div style="width:56px; height:56px; background:#EADFCB; border-radius:4px;"></div><div class="tick-name">xs · 4</div></div>
      <div class="col" style="gap:6px; align-items:center;"><div style="width:56px; height:56px; background:#EADFCB; border-radius:8px;"></div><div class="tick-name">sm · 8</div></div>
      <div class="col" style="gap:6px; align-items:center;"><div style="width:56px; height:56px; background:#EADFCB; border-radius:14px;"></div><div class="tick-name">md · 14</div></div>
      <div class="col" style="gap:6px; align-items:center;"><div style="width:56px; height:56px; background:#EADFCB; border-radius:22px;"></div><div class="tick-name">lg · 22</div></div>
      <div class="col" style="gap:6px; align-items:center;"><div style="width:96px; height:40px; background:#EADFCB; border-radius:999px;"></div><div class="tick-name">pill · 999</div></div>
    </div>
  </div>
</div>
</body></html>
