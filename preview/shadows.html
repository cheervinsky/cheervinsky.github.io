<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:14px; justify-content:center;">
    <div class="label">Shadows — low, warm, short</div>
    <div class="row" style="gap:18px; align-items:center; padding:8px 4px;">
      <div class="col" style="gap:8px; align-items:center;">
        <div style="width:120px; height:64px; background:#EADFCB; border-radius:14px; box-shadow:0 1px 0 rgba(30,26,23,.04), 0 2px 6px rgba(30,26,23,.06);"></div>
        <div class="tick-name">shadow-1 · rest</div>
      </div>
      <div class="col" style="gap:8px; align-items:center;">
        <div style="width:120px; height:64px; background:#EADFCB; border-radius:14px; box-shadow:0 2px 0 rgba(30,26,23,.05), 0 10px 24px -8px rgba(30,26,23,.14);"></div>
        <div class="tick-name">shadow-2 · hover</div>
      </div>
      <div class="col" style="gap:8px; align-items:center;">
        <div style="width:120px; height:64px; background:#EADFCB; border-radius:14px; box-shadow:0 3px 0 rgba(30,26,23,.06), 0 24px 48px -16px rgba(30,26,23,.22);"></div>
        <div class="tick-name">shadow-3 · modal</div>
      </div>
      <div class="col" style="gap:8px; align-items:center;">
        <div style="width:120px; height:64px; background:#EADFCB; border-radius:14px; box-shadow:inset 0 1px 0 rgba(255,247,230,.9), inset 0 -1px 0 rgba(30,26,23,.06);"></div>
        <div class="tick-name">inset · pressed</div>
      </div>
    </div>
  </div>
</div>
</body></html>
