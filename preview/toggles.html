<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:10px; justify-content:center;">
    <div class="label">Toggles &amp; radio</div>
    <div class="row" style="gap:22px; align-items:center; font-family:'Inter',sans-serif;">
      <div class="row" style="gap:10px; align-items:center;">
        <div style="width:40px; height:24px; background:#E9873B; border-radius:999px; position:relative; box-shadow:inset 0 1px 0 rgba(30,26,23,.08);">
          <div style="position:absolute; right:2px; top:2px; width:20px; height:20px; background:#F3EADB; border-radius:999px; box-shadow:0 1px 3px rgba(30,26,23,.2);"></div>
        </div>
        <span style="font-size:14px;">On</span>
      </div>
      <div class="row" style="gap:10px; align-items:center;">
        <div style="width:40px; height:24px; background:#D6C8AF; border-radius:999px; position:relative;">
          <div style="position:absolute; left:2px; top:2px; width:20px; height:20px; background:#F3EADB; border-radius:999px; box-shadow:0 1px 3px rgba(30,26,23,.15);"></div>
        </div>
        <span style="font-size:14px; color:#8A7F72;">Off</span>
      </div>
      <div class="row" style="gap:10px; align-items:center;">
        <div style="width:18px; height:18px; border:2px solid #E9873B; border-radius:999px; display:flex; align-items:center; justify-content:center;">
          <div style="width:8px; height:8px; background:#E9873B; border-radius:999px;"></div>
        </div>
        <span style="font-size:14px;">Selected</span>
      </div>
      <div class="row" style="gap:10px; align-items:center;">
        <div style="width:18px; height:18px; border:2px solid #D6C8AF; border-radius:999px;"></div>
        <span style="font-size:14px; color:#8A7F72;">Unselected</span>
      </div>
      <div class="row" style="gap:10px; align-items:center;">
        <div style="width:18px; height:18px; background:#E9873B; border-radius:5px; display:flex; align-items:center; justify-content:center; color:#F3EADB; font:700 12px Inter;">✓</div>
        <span style="font-size:14px;">Checked</span>
      </div>
    </div>
  </div>
</div>
</body></html>
