<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row grow" style="gap:14px; align-items:stretch;">
    <div style="flex:1; background:#EADFCB; border-radius:14px; padding:18px; box-shadow:0 1px 0 rgba(30,26,23,.04), 0 2px 6px rgba(30,26,23,.06); display:flex; flex-direction:column; gap:6px;">
      <div style="font-family:'Fraunces',serif; font-size:20px; line-height:1.1;">Morning session</div>
      <div style="font-family:'Inter',sans-serif; font-size:13px; color:#4B423A; line-height:1.45;">Three quiet breaths, one intention.</div>
      <div style="margin-top:auto; font-family:'JetBrains Mono',monospace; font-size:12px; color:#8A7F72;">5m · Dawn</div>
    </div>
    <div style="flex:1; background:#EADFCB; border-radius:14px; padding:18px; box-shadow:0 2px 0 rgba(30,26,23,.05), 0 10px 24px -8px rgba(30,26,23,.14); transform:translateY(-1px); display:flex; flex-direction:column; gap:6px;">
      <div style="font-family:'Fraunces',serif; font-size:20px; line-height:1.1;">Deep work · hover</div>
      <div style="font-family:'Inter',sans-serif; font-size:13px; color:#4B423A; line-height:1.45;">A slow-burning timer.</div>
      <div style="margin-top:auto; font-family:'JetBrains Mono',monospace; font-size:12px; color:#8A7F72;">50m · Kiln</div>
    </div>
    <div style="flex:1; background:#EADFCB; border-radius:14px; padding:18px; box-shadow:inset 0 1px 0 rgba(255,247,230,.9), inset 0 -1px 0 rgba(30,26,23,.06); display:flex; flex-direction:column; gap:6px;">
      <div style="font-family:'Fraunces',serif; font-size:20px; line-height:1.1;">Notice · pressed</div>
      <div style="font-family:'Inter',sans-serif; font-size:13px; color:#4B423A; line-height:1.45;">How was today?</div>
      <div style="margin-top:auto; font-family:'JetBrains Mono',monospace; font-size:12px; color:#8A7F72;">2m · Mira</div>
    </div>
  </div>
</div>
</body></html>
