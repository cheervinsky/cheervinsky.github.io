<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:14px; justify-content:center;">
    <div class="label">Badges & tags</div>
    <div class="row" style="gap:10px; flex-wrap:wrap; font-family:'Inter',sans-serif;">
      <span style="background:#FADFB9; color:#7A3E10; padding:5px 12px; border-radius:999px; font:500 12px Inter; letter-spacing:.02em;">New</span>
      <span style="background:#EADFCB; color:#4B423A; padding:5px 12px; border-radius:999px; font:500 12px Inter; letter-spacing:.02em; border:1px solid #D6C8AF;">5 min</span>
      <span style="background:rgba(94,140,76,.16); color:#3E5D33; padding:5px 12px; border-radius:999px; font:500 12px Inter;">On track</span>
      <span style="background:rgba(201,138,43,.18); color:#8A5A14; padding:5px 12px; border-radius:999px; font:500 12px Inter;">Due today</span>
      <span style="background:rgba(180,67,43,.14); color:#8D3321; padding:5px 12px; border-radius:999px; font:500 12px Inter;">Missed</span>
      <span style="background:#EADFCB; color:#4B423A; padding:5px 10px; border-radius:6px; font:500 11px 'JetBrains Mono'; letter-spacing:.04em;">KILN · v2</span>
    </div>
  </div>
</div>
</body></html>
