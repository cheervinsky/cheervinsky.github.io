<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row grow" style="gap:18px; align-items:center;">
    <div style="position:relative; display:inline-block;">
      <span style="font-family:'Fraunces',serif; font-size:44px; font-weight:400; letter-spacing:-0.03em; color:#1E1A17; font-variation-settings:'opsz' 96,'SOFT' 60; line-height:1;">cheervinsky</span>
      <span style="position:absolute; top:-6px; left:56%; width:10px; height:10px; background:#E9873B; border-radius:999px;"></span>
    </div>
    <div style="width:1px; height:48px; background:#D6C8AF;"></div>
    <div style="width:56px; height:56px; border-radius:999px; background:#F3EADB; border:1.5px solid #1E1A17; display:flex; align-items:center; justify-content:center; position:relative;">
      <span style="font-family:'Fraunces',serif; font-size:44px; font-weight:400; color:#1E1A17; line-height:1; font-variation-settings:'opsz' 144,'SOFT' 60;">c</span>
      <span style="position:absolute; top:8px; right:14px; width:8px; height:8px; background:#E9873B; border-radius:999px;"></span>
    </div>
    <div class="col" style="gap:4px; margin-left:8px;">
      <div class="tick-name">Wordmark + sigil</div>
      <div class="tick">Fraunces lowercase · honey dot over the 'i'</div>
    </div>
  </div>
</div>
</body></html>
