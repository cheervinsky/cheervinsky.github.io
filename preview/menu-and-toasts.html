<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col grow" style="gap:10px; justify-content:center;">
    <div class="label">Menu</div>
    <div class="row" style="gap:16px;">
      <div style="flex:1; background:#EADFCB; border-radius:14px; padding:8px; box-shadow:0 3px 0 rgba(30,26,23,.06), 0 24px 48px -16px rgba(30,26,23,.22); font-family:'Inter',sans-serif; font-size:14px;">
        <div style="padding:9px 12px; border-radius:8px;">Open today's session</div>
        <div style="padding:9px 12px; border-radius:8px; background:#FADFB9; color:#7A3E10; font-weight:500;">Start new intention</div>
        <div style="padding:9px 12px; border-radius:8px;">Review this week</div>
        <div style="height:1px; background:#D6C8AF; margin:6px 4px;"></div>
        <div style="padding:9px 12px; border-radius:8px; color:#8A7F72;">Settings <span style="float:right; font-family:'JetBrains Mono',monospace; font-size:11px;">⌘,</span></div>
      </div>
      <div class="col" style="flex:1; gap:8px; font-family:'Inter',sans-serif;">
        <div style="background:rgba(94,140,76,.16); color:#3E5D33; border-radius:10px; padding:10px 14px; font-size:13px;">✓ Saved. See you tomorrow.</div>
        <div style="background:rgba(201,138,43,.18); color:#8A5A14; border-radius:10px; padding:10px 14px; font-size:13px;">You're offline. We'll catch up when you're back.</div>
        <div style="background:rgba(180,67,43,.14); color:#8D3321; border-radius:10px; padding:10px 14px; font-size:13px;">That didn't go through. Try again?</div>
      </div>
    </div>
  </div>
</div>
</body></html>
